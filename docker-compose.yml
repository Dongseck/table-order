services:
  db:
    image: postgres:16-alpine
    container_name: table-order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: table_order
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d table_order"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: table-order-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/table_order
      JWT_SECRET: workshop-secret-change-in-production
      JWT_EXPIRES_IN: 16h
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

volumes:
  pgdata: {}
